<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page - Pooja Bazaar</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&amp;display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* General Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        html, body {
            height: 100%;
            overflow-x: hidden;
        }

        body {
            background: #460c0c;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: 80px; /* Space for the fixed navbar */
            overflow-y: auto;
            position: relative;
        }

        body::before {
            content: "";
            background: url('logo1.png') no-repeat center;
            background-size: 130%;
            opacity: 0.20;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #3e0404;
            color: white;
            padding: 2px 10px;
            width: 100%;
            height: 65px; /* Fixed height for better control */
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .logo-link img {
            height: 70px;
            width: 110px;
            margin-left: 10px;
        }
        
        /* Default state: Hide mobile menu on desktop */
        .mobile-menu-container {
            display: flex;
            align-items: center;
        }

        .navbar nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        .navbar nav ul li a {
            text-decoration: none;
            color: #c77c0d;
            font-weight: 500;
            display: flex;
            justify-content: center;
            flex-direction: column;
            box-shadow: 0 6px 6px 6px rgba(0, 0, 0, 0.20);
            width: 35px;
            height: 4.8vh;
            border-radius: 50px;
            align-items: center;
            gap: 5px;
            font-size: 14px;
            transition: color 0.3s;
        }

        .navbar nav ul li a:hover {
            color: white;
            text-decoration: none;
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: none;
        }

        .user-actions {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-left: 20px;
        }

        .user-actions .nav-button {
            background-color: #a8600a;
            color: white;
            padding: 6px 6px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            transition: background-color 0.3s, color 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .user-actions .nav-button:hover {
            background-color: transparent;
            color: #fff;
            border: 1px solid;
            text-decoration: none;
        }

        .hamburger-menu {
            display: none; /* Hide on desktop */
            flex-direction: column;
            justify-content: space-around;
            width: 25px;
            height: 20px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            margin-right: 15px;
        }

        .bar {
            display: block;
            width: 100%;
            height: 2px;
            background-color: #a8600a;
            border-radius: 3px;
            transition: all 0.3s ease-in-out;
        }

        /* Registration page styling */
        .register-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            height: 88vh;
            color: white;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 1;
            position: relative;
            animation: fadeInUp 1s ease;
            margin-bottom: 2rem;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .register-box h2 {
            font-size: 25px;
            margin-bottom: 10px;
        }

        .input-group {
            margin-bottom: 5px;
            text-align: left;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .white-input {
            width: 100%;
            height: 40px;
            padding: 10px;
            background-color: transparent;
            color: white;
            border: 1px solid #777;
            border-radius: 10px;
            font-size: 16px;
        }

        ::placeholder {
            color: #ccc;
            opacity: 1;
        }

        .toggle-password {
            position: absolute;
            top: 36px;
            right: 15px;
            color: #f0c26e;
            cursor: pointer;
            font-size: 16px;
        }

        .register-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background-color: #f0c26e;
            color: #004281;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        .register-btn:hover {
            border: 1px solid #fff;
            background-color: #460c0c;
            color: #fff;
        }

        .link {
            display: block;
            margin-top: 20px;
            color: #ffffff;
            font-size: 14px;
            text-decoration: none;
        }

        .link:hover {
            text-decoration: underline;
        }

        .social-login {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .social-login a {
            font-size: 20px;
            color: #f0c26e;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            text-decoration: none;
        }

        .social-login a:hover {
            background: white;
            color: #004281;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #4CAF50;
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            animation: fadeInOut 4s ease forwards;
            z-index: 9999;
        }

        .toast.error {
            background: #ff4d4d;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px); }
            10% { opacity: 1; transform: translateY(0); }
            90% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(20px); }
        }

        /* Media Queries for Responsiveness */
        @media (max-width: 768px) {
            .mobile-menu-container {
                display: none;
            }

            .hamburger-menu {
                display: flex;
            }

            .mobile-menu-container.is-open {
                display: flex;
                flex-direction: column;
                position: fixed;
                top: 65px;
                left: 0;
                width: 100%;
                background-color: #822727;
                padding: 10px 0;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
                height: auto; /* Allow height to adjust to content */
            }

            .mobile-menu-container.is-open nav {
                width: 100%;
            }

            .mobile-menu-container.is-open nav ul {
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
            
            .mobile-menu-container.is-open .user-actions {
                display: flex;
                flex-direction: column;
                align-items: center;
                width: 100%;
                padding-top: 10px;
                margin-left: 0;
                border-top: 1px solid rgba(255, 255, 255, 0.1);
            }

            .register-box {
                margin-top: 2rem;
                padding: 25px;
            }
        }
    </style>
</head>
<body>

<header class="navbar">
    <a href="#" class="logo-link">
        <big><img src="images/logo7.png" alt="Pooja Bazaar Logo" class="images/logo-image"></big>
    </a>
    <div class="mobile-menu-container">
        <nav>
            <ul>
                <li title="Home"><a href="pbhome.html" class="nav-item" aria-label="Home"><i class="fas fa-house"></i></a></li>
                <li title="Pooja Kits"><a href="#" aria-label="Pooja Kits"><i class="fas fa-gift"></i> </a></li>
                <li title="Offers"><a href="#" aria-label="Offers"><i class="fas fa-percentage"></i> </a></li>
                <li title="About Us"><a href="#" aria-label="About Us"><i class="fas fa-book"></i> </a></li>
                <li title="Blog"><a href="#" aria-label="About Us"><i class="fas fa-blog"></i> </a></li>
            </ul>
        </nav>
        <div class="user-actions">
            <a href="pblogin.html" class="nav-button" aria-label="Login"><i class="fas fa-right-to-bracket"></i> LOGIN</a>
            <a href="pbregister.html" class="nav-button" aria-label="Register"><i class="fas fa-user-plus"></i> REGISTER</a>
        </div>
    </div>
    <button class="hamburger-menu" aria-label="Toggle navigation">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
    </button>
</header>

<main>
    <div class="register-box">
        <h2>Register New Account</h2>
        <div class="social-login">
            <a href="#" title="Sign up with Google"><i class="fab fa-google"></i></a>
            <a href="#" title="Sign up with LinkedIn"><i class="fab fa-linkedin-in"></i></a>
            <a href="#" title="Sign up with GitHub"><i class="fab fa-github"></i></a>
            <a href="#" title="Sign up with Facebook"><i class="fab fa-facebook-f"></i></a>
            <a href="#" title="Sign up with X(Twitter)"><i class="fab fa-x"></i></a>
        </div>
        <div class="input-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" class="white-input" placeholder="Enter your full name" maxlength="60">
        </div>
        <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" class="white-input" placeholder="Enter your email" maxlength="60">
        </div>
        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" class="white-input" placeholder="Choose a username" maxlength="40">
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="white-input" placeholder="Create a password" maxlength="20" oninput="checkPasswordStrength(this.value)">
            <span class="toggle-password" onclick="togglePassword('password', 'eye1')">
                <i class="fas fa-eye" id="eye1"></i>
            </span>
            <small id="password-strength" style="display:block; margin-top: 5px; font-weight: 500;"></small>
        </div>
        <div class="input-group">
            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" class="white-input" placeholder="Confirm your password" maxlength="20">
            <span class="toggle-password" onclick="togglePassword('confirm-password', 'eye2')">
                <i class="fas fa-eye" id="eye2"></i>
            </span>
        </div>
        <button class="register-btn" onclick="handleRegister()">Register</button>
        <a class="link" href="pblogin.html">Already have an account? Login</a>
    </div>
</main>

<!-- ✅ Script Section --> 
<script> 
    function togglePassword(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove("fa-eye");
            icon.classList.add("fa-eye-slash");
        } else {
            input.type = "password";
            icon.classList.remove("fa-eye-slash");
            icon.classList.add("fa-eye");
        }
    }

    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast' + (isError ? ' error' : '');
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }

    function checkPasswordStrength(password) {
        const strengthText = document.getElementById("password-strength");
        let strength = 0;

        if (password.length >= 8) strength++;
        if (/[A-Z]/.test(password)) strength++;
        if (/[0-9]/.test(password)) strength++;
        if (/[\W_]/.test(password)) strength++;

        if (password.length === 0) {
            strengthText.innerText = "";
            return;
        }

        if (strength <= 1) {
            strengthText.innerText = "Weak password";
            strengthText.style.color = "red";
        } else if (strength === 2 || strength === 3) {
            strengthText.innerText = "Medium password";
            strengthText.style.color = "orange";
        } else {
            strengthText.innerText = "Strong password";
            strengthText.style.color = "lightgreen";
        }
    }

    function handleRegister() {
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        let username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const confirmPassword = document.getElementById('confirm-password').value.trim();

        if (!name || !email || !username || !password || !confirmPassword) {
            showToast('Please fill out all fields to create an account.', true);
            return;
        }

        if (!/^[\w.-]+@[\w.-]+\.\w{2,}$/.test(email)) {
            showToast('Please enter a valid email address.', true);
            return;
        }

        if (username.length < 3) {
            showToast("Username must be at least 3 characters.", true);
            return;
        }

        if (!/^[a-zA-Z0-9._-]+$/.test(username)) {
            showToast("Username can only contain letters, numbers, dot, underscore, or hyphen.", true);
            return;
        }

        if (password.length < 8) {
            showToast("Password must be at least 8 characters long.", true);
            return;
        }

        if (password !== confirmPassword) {
            showToast("Passwords do not match.", true);
            return;
        }

        let users = JSON.parse(localStorage.getItem('registeredUsers')) || [];

        const existingEmail = users.find(user => user.email === email);
        if (existingEmail) {
            showToast("This email is already registered.", true);
            return;
        }

        let existingUsername = users.find(user => user.username.toLowerCase() === username.toLowerCase());
        if (existingUsername) {
            let suggestion;
            do {
                const randomNum = Math.floor(Math.random() * 1000);
                suggestion = username + randomNum;
                existingUsername = users.find(user => user.username.toLowerCase() === suggestion.toLowerCase());
            } while (existingUsername);

            showToast(`This username is taken. Suggested: ${suggestion}`, true);
            document.getElementById('username').value = suggestion;
            return;
        }

        // ✅ Save new user
        const userData = { name, email, username, password };
        users.push(userData);
        localStorage.setItem('registeredUsers', JSON.stringify(users));

        // ❌ Don’t auto-login → Just redirect to login page
        showToast('Account created successfully! Please login.');
        setTimeout(() => {
            window.location.href = "pblogin.html"; // ✅ redirect to login page
        }, 2000);
    }

    document.addEventListener('DOMContentLoaded', function() {
        const hamburgerMenu = document.querySelector('.hamburger-menu');
        const mobileMenuContainer = document.querySelector('.mobile-menu-container');

        hamburgerMenu.addEventListener('click', function() {
            mobileMenuContainer.classList.toggle('is-open');
        });
    });
</script>

</body>
</html>
